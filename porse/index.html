<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porše</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="css/image/favicon.png" type="image/x-icon">
</head>
<body>
    <header>
        <div class="menu"><span>&#9776;</span></div>
        <div class="logo"><h1>Porše</h1></div>
        <div class="location"><p>Porše centar ZZO</p></div>
    </header>
    <main>
        <section class="hero">
            <img src="css/image/hero.jpg" alt="Porsche" class="hero-image">
        </section>
        <section class="models">
            <h2>Modeli</h2>
            <div class="model-grid">
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/sedamstotinaosamnaest.jpg" alt="model"></div>
                    <p class="model-name">Sedam Stotina Osamnaest<br><span class="price">336,501 marki</span></p>
                </div>
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/devetstotinajedanaest.jpg" alt="model"></div>
                    <p class="model-name">Devet Stotina Jedanaest<br><span class="price">554,524 marki</span></p>
                </div>
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/mačak.jpg" alt="model"></div>
                    <p class="model-name">Mačak<br><span class="price">238,724 marki</span></p>
                </div>
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/tajkan.jpg" alt="model"></div>
                    <p class="model-name">Tajvan<br><span class="price">426,607 marki</span></p>
                </div>
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/paranoja.jpg" alt="model"></div>
                    <p class="model-name">Paranoja<br><span class="price">485,120 marki</span></p>
                </div>
                <div class="model-card">
                    <div class="image-placeholder"><img src="css/image/kajen.jpg" alt="model"></div>
                    <p class="model-name">Kajmak<br><span class="price">392,295 marki</span></p>
                </div>
            </div>
        </section>
        <section class="social">
            <h2>Povežite se s vama</h2>
            <div class="social-icons">
                <a href="https://www.facebook.com/PorscheBiH/">FB</a>
                <a href="https://www.instagram.com/porsche_centar_sarajevo/">IG</a>
                <a href="https://www.linkedin.com/company/porsche-centar-sarajevo/">IN</a>
                <a href="https://www.youtube.com/channel/UCXipTwdLm2NhRi6QZhtP00Q">YT</a>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025</p>
        <p><a href="https://dealer.porsche.com/ba/sarajevo/hr-BA/Pravila-privatnosti">Pravila privatnosti</a></p>
        <p><a href="https://configurator.porsche.com/bs-BA/model-start/dealer/16727/">Konfigurator</a></p>
        <h1>Porše</h1>
    </footer>
</body>
</html>
